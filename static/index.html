<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0a0f1a" />
  <title>CourseBot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-void: #050810;
      --bg-surface: #0c1222;
      --bg-raised: #121a2e;
      --bg-card: #0e1528;
      --border: rgba(148, 163, 184, 0.1);
      --border-glow: rgba(99, 102, 241, 0.25);
      --text: #f8fafc;
      --text-muted: #94a3b8;
      --text-dim: #64748b;
      --accent: #22d3ee;
      --accent-2: #a78bfa;
      --accent-mix: linear-gradient(135deg, #06b6d4 0%, #8b5cf6 55%, #6366f1 100%);
      --success: #4ade80;
      --warn: #fcd34d;
      --err: #fb7185;
      --r-lg: 1.125rem;
      --r-md: 0.625rem;
      --r-full: 9999px;
      --font: "Plus Jakarta Sans", system-ui, sans-serif;
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: var(--font);
      background: var(--bg-void);
      color: var(--text);
      min-height: 100vh;
      margin: 0;
      -webkit-font-smoothing: antialiased;
    }

    /* Full-width web app — not a centered “phone column” */
    .shell {
      width: 100%;
      max-width: none;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border);
    }

    .shell::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(900px 420px at 15% -8%, rgba(6, 182, 212, 0.14), transparent 55%),
        radial-gradient(700px 380px at 95% 12%, rgba(139, 92, 246, 0.1), transparent 50%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.02) 0%, transparent 28%);
    }

    .top {
      position: relative;
      z-index: 2;
      padding: 1rem clamp(1rem, 4vw, 3rem) 0.95rem;
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(16px);
      background: rgba(12, 18, 34, 0.88);
    }

    .top-bar {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 1rem;
      max-width: 1400px;
      margin: 0 auto;
    }

    @media (min-width: 768px) {
      .top-bar {
        flex-direction: row;
        align-items: flex-start;
        justify-content: space-between;
        gap: 2rem;
      }
      .settings {
        margin-top: 0.15rem;
        flex-shrink: 0;
      }
    }

    .brand {
      display: flex;
      align-items: flex-start;
      gap: 0.85rem;
      min-width: 0;
    }

    .mark {
      width: 3rem;
      height: 3rem;
      border-radius: var(--r-md);
      background: var(--accent-mix);
      display: grid;
      place-items: center;
      font-size: 1.35rem;
      box-shadow: 0 8px 28px rgba(6, 182, 212, 0.22);
      flex-shrink: 0;
    }

    .brand-text h1 {
      margin: 0;
      font-size: 1.35rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1.15;
      background: linear-gradient(90deg, #fff 0%, #cbd5e1 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .brand-text .sub {
      margin: 0.3rem 0 0;
      font-size: 0.8125rem;
      color: var(--text-muted);
      line-height: 1.5;
      max-width: 32rem;
    }

    .settings {
      margin-top: 0;
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem 1rem;
      align-items: center;
    }

    .toggle {
      display: inline-flex;
      align-items: center;
      gap: 0.55rem;
      cursor: pointer;
      user-select: none;
      padding: 0.35rem 0.6rem 0.35rem 0.35rem;
      border-radius: var(--r-full);
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border);
      transition: border-color 0.2s ease, background 0.2s ease;
    }

    .toggle:hover {
      border-color: rgba(148, 163, 184, 0.2);
      background: rgba(255, 255, 255, 0.05);
    }

    .toggle input {
      position: absolute;
      opacity: 0;
      width: 0;
      height: 0;
    }

    .toggle-track {
      width: 2.35rem;
      height: 1.25rem;
      border-radius: var(--r-full);
      background: #1e293b;
      border: 1px solid var(--border);
      position: relative;
      transition: background 0.2s ease, border-color 0.2s ease;
    }

    .toggle-track::after {
      content: "";
      position: absolute;
      top: 2px;
      left: 2px;
      width: calc(50% - 4px);
      height: calc(100% - 4px);
      border-radius: var(--r-full);
      background: #64748b;
      transition: transform 0.22s cubic-bezier(0.34, 1.2, 0.64, 1), background 0.2s ease;
    }

    .toggle input:checked + .toggle-track {
      background: rgba(6, 182, 212, 0.2);
      border-color: rgba(6, 182, 212, 0.35);
    }

    .toggle input:checked + .toggle-track::after {
      transform: translateX(100%);
      background: linear-gradient(135deg, #22d3ee, #a78bfa);
    }

    .toggle input:focus-visible + .toggle-track {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .toggle-label {
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--text-muted);
    }

    .toggle input:checked ~ .toggle-label {
      color: var(--text);
    }

    .chat {
      position: relative;
      z-index: 1;
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
      background:
        linear-gradient(var(--bg-surface), var(--bg-surface)),
        repeating-linear-gradient(
          0deg,
          transparent,
          transparent 24px,
          rgba(148, 163, 184, 0.03) 24px,
          rgba(148, 163, 184, 0.03) 25px
        );
    }

    .empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem 1.5rem;
      text-align: center;
    }

    .empty.hidden { display: none; }

    .empty-card {
      width: 100%;
      max-width: min(36rem, 100%);
      padding: 1.5rem 1.35rem;
      border-radius: var(--r-lg);
      background: var(--bg-raised);
      border: 1px solid var(--border);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.35);
    }

    .empty-card h2 {
      margin: 0;
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
    }

    .empty-card p {
      margin: 0.5rem 0 0;
      font-size: 0.8125rem;
      color: var(--text-muted);
      line-height: 1.55;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 0.45rem;
      justify-content: center;
      margin-top: 1.1rem;
    }

    .chip {
      font-family: var(--font);
      font-size: 0.72rem;
      font-weight: 600;
      padding: 0.4rem 0.75rem;
      border-radius: var(--r-full);
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.04);
      color: var(--text-muted);
      cursor: pointer;
      transition: color 0.15s ease, border-color 0.15s ease, background 0.15s ease, transform 0.12s ease;
    }

    .chip:hover {
      color: var(--text);
      border-color: rgba(34, 211, 238, 0.35);
      background: rgba(34, 211, 238, 0.08);
      transform: translateY(-1px);
    }

    .chip:active { transform: translateY(0); }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 1rem clamp(1rem, 4vw, 3rem) 7.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.05rem;
      scroll-behavior: smooth;
      max-width: 1400px;
      margin: 0 auto;
      width: 100%;
    }

    .messages::-webkit-scrollbar { width: 7px; }
    .messages::-webkit-scrollbar-thumb {
      background: rgba(148, 163, 184, 0.25);
      border-radius: 4px;
    }

    .row {
      display: flex;
      gap: 0.65rem;
      max-width: 100%;
      animation: enter 0.28s cubic-bezier(0.22, 1, 0.36, 1);
    }

    @keyframes enter {
      from { opacity: 0; transform: translateY(10px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .row.user { flex-direction: row-reverse; }

    .avatar {
      width: 2.25rem;
      height: 2.25rem;
      border-radius: 50%;
      font-size: 0.58rem;
      font-weight: 800;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 0.2rem;
      letter-spacing: 0.02em;
    }

    .row.user .avatar {
      background: var(--accent-mix);
      color: #fff;
      box-shadow: 0 4px 16px rgba(99, 102, 241, 0.35);
    }

    .row.bot .avatar {
      background: var(--bg-raised);
      color: var(--accent);
      border: 1px solid var(--border);
      box-shadow: 0 0 0 3px rgba(34, 211, 238, 0.06);
    }

    .bubble-wrap {
      min-width: 0;
      max-width: calc(100% - 2.9rem);
    }

    .row.bot .bubble-wrap {
      max-width: min(960px, calc(100% - 2.9rem));
    }

    .row.user .bubble-wrap {
      max-width: min(520px, calc(100% - 2.9rem));
    }

    .bubble {
      padding: 0.9rem 1.05rem;
      border-radius: var(--r-lg);
      line-height: 1.58;
      font-size: 0.9rem;
    }

    .row.user .bubble {
      background: var(--accent-mix);
      color: #fff;
      border-bottom-right-radius: 0.35rem;
      box-shadow: 0 6px 24px rgba(6, 182, 212, 0.18);
    }

    .row.bot .bubble {
      background: var(--bg-raised);
      border: 1px solid var(--border);
      border-bottom-left-radius: 0.35rem;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.25);
    }

    .row.bot.error .bubble {
      border-color: rgba(251, 113, 133, 0.45);
      background: rgba(251, 113, 133, 0.06);
    }

    .meta-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.4rem;
      margin-bottom: 0.5rem;
    }

    .pill {
      font-size: 0.62rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      padding: 0.22rem 0.5rem;
      border-radius: var(--r-full);
    }

    .pill.rag {
      background: rgba(74, 222, 128, 0.15);
      color: var(--success);
      border: 1px solid rgba(74, 222, 128, 0.25);
    }

    .pill.rule {
      background: rgba(148, 163, 184, 0.1);
      color: var(--text-muted);
      border: 1px solid var(--border);
    }

    .pill.model {
      text-transform: none;
      letter-spacing: 0;
      font-weight: 600;
      font-size: 0.68rem;
      background: rgba(34, 211, 238, 0.1);
      color: var(--accent);
      border: 1px solid rgba(34, 211, 238, 0.22);
    }

    .reply { white-space: pre-wrap; word-break: break-word; }

    .note {
      margin-top: 0.6rem;
      font-size: 0.76rem;
      color: var(--warn);
      padding: 0.5rem 0.65rem;
      background: rgba(252, 211, 77, 0.07);
      border-radius: var(--r-md);
      border: 1px solid rgba(252, 211, 77, 0.18);
      line-height: 1.45;
    }

    .rag-debug { margin-top: 0.7rem; font-size: 0.72rem; }
    .rag-debug summary {
      cursor: pointer;
      color: var(--accent);
      font-weight: 700;
      list-style: none;
    }
    .rag-debug summary::-webkit-details-marker { display: none; }
    .rag-debug summary::before {
      content: "▸ ";
      display: inline-block;
      transition: transform 0.2s ease;
    }
    .rag-debug[open] summary::before { transform: rotate(90deg); }

    .rag-debug pre {
      margin: 0.55rem 0 0;
      padding: 0.75rem;
      background: var(--bg-void);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      overflow-x: auto;
      white-space: pre-wrap;
      word-break: break-word;
      color: var(--text-muted);
      max-height: 16rem;
      font-size: 0.68rem;
      line-height: 1.45;
    }

    .courses-header {
      margin-top: 0.95rem;
      padding-top: 0.8rem;
      border-top: 1px solid var(--border);
      font-size: 0.62rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-dim);
    }

    .courses {
      margin-top: 0.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .course-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      border-radius: var(--r-md);
      padding: 0.85rem 1rem;
      font-size: 0.8rem;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }

    .course-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.35);
    }

    .course-card .badges { display: flex; flex-wrap: wrap; gap: 0.35rem; margin-bottom: 0.35rem; }
    .badge {
      display: inline-block;
      padding: 0.18rem 0.5rem;
      border-radius: var(--r-full);
      font-size: 0.66rem;
      font-weight: 700;
    }
    .badge.code {
      background: rgba(34, 211, 238, 0.12);
      color: var(--accent);
      border: 1px solid rgba(34, 211, 238, 0.2);
    }
    .badge.meta {
      background: rgba(148, 163, 184, 0.08);
      color: var(--text-muted);
      border: 1px solid var(--border);
    }
    .course-card .title { font-weight: 700; font-size: 0.88rem; margin-top: 0.1rem; }
    .course-card .instructor {
      margin-top: 0.35rem;
      font-size: 0.76rem;
      color: var(--accent-2);
      font-weight: 600;
    }
    .course-card .desc { margin-top: 0.45rem; color: var(--text-muted); line-height: 1.48; font-size: 0.8rem; }
    .course-card .prereqs {
      margin-top: 0.5rem;
      font-size: 0.72rem;
      color: var(--text-dim);
      padding-top: 0.5rem;
      border-top: 1px dashed var(--border);
    }

    .composer {
      position: sticky;
      bottom: 0;
      z-index: 2;
      padding: 0.85rem clamp(1rem, 4vw, 3rem) 1.15rem;
      padding-bottom: max(1.15rem, env(safe-area-inset-bottom));
      border-top: 1px solid var(--border);
      background: rgba(12, 18, 34, 0.94);
      backdrop-filter: blur(20px);
    }

    .composer-inner {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      gap: 0.55rem;
      align-items: flex-end;
      padding: 0.45rem;
      border-radius: 1.15rem;
      background: var(--bg-raised);
      border: 1px solid var(--border);
      box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.02) inset;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .composer-inner:focus-within {
      border-color: rgba(34, 211, 238, 0.35);
      box-shadow: 0 0 0 3px rgba(34, 211, 238, 0.1), 0 0 0 1px rgba(255, 255, 255, 0.02) inset;
    }

    .composer-inner textarea {
      flex: 1;
      min-height: 2.65rem;
      max-height: 8rem;
      padding: 0.55rem 0.65rem;
      border: none;
      border-radius: 0.75rem;
      background: transparent;
      color: var(--text);
      font-size: 0.92rem;
      font-family: inherit;
      line-height: 1.45;
      resize: none;
      field-sizing: content;
    }

    .composer-inner textarea::placeholder { color: var(--text-dim); }
    .composer-inner textarea:focus { outline: none; }

    @supports not (field-sizing: content) {
      .composer-inner textarea { min-height: 2.65rem; height: 2.65rem; }
    }

    .send-btn {
      flex-shrink: 0;
      width: 2.65rem;
      height: 2.65rem;
      border: none;
      border-radius: 0.85rem;
      background: var(--accent-mix);
      color: #fff;
      cursor: pointer;
      display: grid;
      place-items: center;
      transition: transform 0.15s ease, opacity 0.15s ease, filter 0.15s ease;
    }

    .send-btn:hover:not(:disabled) {
      filter: brightness(1.08);
      transform: scale(1.03);
    }

    .send-btn:active:not(:disabled) { transform: scale(0.97); }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .send-btn svg { width: 1.15rem; height: 1.15rem; }

    .send-btn:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .hint {
      margin-top: 0.45rem;
      text-align: center;
      font-size: 0.68rem;
      color: var(--text-dim);
    }

    .loading-row .bubble {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      color: var(--text-muted);
      font-size: 0.86rem;
    }

    .dots { display: flex; gap: 5px; }
    .dots span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 1.1s ease infinite;
    }
    .dots span:nth-child(2) { animation-delay: 0.15s; }
    .dots span:nth-child(3) { animation-delay: 0.3s; }

    @keyframes pulse {
      0%, 80%, 100% { transform: scale(1); opacity: 0.35; }
      40% { transform: scale(1.15); opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="top">
      <div class="top-bar">
        <div class="brand">
          <div class="mark" aria-hidden="true">📚</div>
          <div class="brand-text">
            <h1>CourseBot</h1>
            <p class="sub">
              Search your catalog, then optionally summarize with AI—only using courses retrieved from the database.
            </p>
          </div>
        </div>
        <div class="settings">
          <label class="toggle">
            <input type="checkbox" id="use-llm" checked />
            <span class="toggle-track" aria-hidden="true"></span>
            <span class="toggle-label">AI answer (RAG)</span>
          </label>
          <label class="toggle">
            <input type="checkbox" id="rag-debug" />
            <span class="toggle-track" aria-hidden="true"></span>
            <span class="toggle-label">Show prompt debug</span>
          </label>
        </div>
      </div>
    </header>

    <div class="chat">
      <div class="empty" id="empty-state">
        <div class="empty-card">
          <h2>What do you want to know?</h2>
          <p>Tap a suggestion or type your own question. Retrieval runs first; the model only sees those rows.</p>
          <div class="chips">
            <button type="button" class="chip" data-q="1-credit CS courses">1-credit CS</button>
            <button type="button" class="chip" data-q="courses with no prerequisites">No prerequisites</button>
            <button type="button" class="chip" data-q="prerequisites for CS102">CS102 prereqs</button>
            <button type="button" class="chip" data-q="machine learning">Machine learning</button>
            <button type="button" class="chip" data-q="calculus">Calculus</button>
          </div>
        </div>
      </div>
      <main class="messages" id="messages" aria-live="polite"></main>
    </div>

    <footer class="composer">
      <div class="composer-inner">
        <textarea
          id="input"
          rows="1"
          placeholder="Ask about courses…"
          autocomplete="off"
          aria-label="Your message"
        ></textarea>
        <button type="button" class="send-btn" id="send" aria-label="Send message">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M22 2L11 13" />
            <path d="M22 2L15 22L11 13L2 9L22 2Z" />
          </svg>
        </button>
      </div>
      <p class="hint">Enter to send · Shift+Enter for new line</p>
    </footer>
  </div>

  <script>
    const messagesEl = document.getElementById('messages');
    const emptyStateEl = document.getElementById('empty-state');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('send');
    const useLlmEl = document.getElementById('use-llm');
    const ragDebugEl = document.getElementById('rag-debug');

    document.querySelectorAll('.chip').forEach((btn) => {
      btn.addEventListener('click', () => {
        inputEl.value = btn.getAttribute('data-q') || '';
        inputEl.focus();
        resizeTa();
      });
    });

    function resizeTa() {
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 8 * 16) + 'px';
    }

    inputEl.addEventListener('input', resizeTa);

    function hideEmptyState() {
      emptyStateEl.classList.add('hidden');
    }

    function formatApiDetail(detail) {
      if (typeof detail === 'string') return detail;
      if (Array.isArray(detail)) {
        return detail.map((e) => e.msg || e.type || JSON.stringify(e)).join(' ');
      }
      return 'Something went wrong.';
    }

    function escapeHtml(s) {
      const div = document.createElement('div');
      div.textContent = s;
      return div.innerHTML;
    }

    function formatCredits(n) {
      const x = Number(n);
      if (Number.isNaN(x)) return String(n) + ' cr';
      return (Math.abs(x % 1) < 1e-9 ? String(Math.round(x)) : x.toFixed(1)) + ' cr';
    }

    function addBotMessage(content, data) {
      hideEmptyState();
      const row = document.createElement('div');
      row.className = 'row bot' + (data.isError ? ' error' : '');

      const avatar = document.createElement('div');
      avatar.className = 'avatar';
      avatar.setAttribute('aria-hidden', 'true');
      avatar.textContent = 'AI';

      const wrap = document.createElement('div');
      wrap.className = 'bubble-wrap';
      const bubble = document.createElement('div');
      bubble.className = 'bubble';

      const meta = document.createElement('div');
      meta.className = 'meta-row';
      if (data.rag_used) {
        const p = document.createElement('span');
        p.className = 'pill rag';
        p.textContent = 'RAG';
        meta.appendChild(p);
        if (data.model) {
          const m = document.createElement('span');
          m.className = 'pill model';
          m.textContent = data.model;
          meta.appendChild(m);
        }
      } else {
        const p = document.createElement('span');
        p.className = 'pill rule';
        p.textContent = data.llm_error ? 'Fallback' : 'Rules';
        meta.appendChild(p);
      }
      bubble.appendChild(meta);

      const reply = document.createElement('div');
      reply.className = 'reply';
      reply.textContent = content;
      bubble.appendChild(reply);

      if (data.llm_error) {
        const note = document.createElement('div');
        note.className = 'note';
        note.textContent = 'Model issue — showing catalog fallback: ' + data.llm_error;
        bubble.appendChild(note);
      }

      if (data.rag_debug) {
        const det = document.createElement('details');
        det.className = 'rag-debug';
        det.innerHTML =
          '<summary>Prompt & retrieved context</summary>' +
          '<pre>' +
          escapeHtml('--- SYSTEM ---\n' + data.rag_debug.system_prompt + '\n\n--- USER ---\n' + data.rag_debug.user_message_sent_to_model) +
          '</pre>';
        bubble.appendChild(det);
      }

      const courses = data.courses;
      if (courses && courses.length > 0) {
        const h = document.createElement('div');
        h.className = 'courses-header';
        h.textContent = 'Catalog rows (' + courses.length + ')';
        bubble.appendChild(h);
        const list = document.createElement('div');
        list.className = 'courses';
        courses.forEach((c) => {
          const card = document.createElement('div');
          card.className = 'course-card';
          let pr = '';
          if (c.prerequisites && c.prerequisites.length) {
            pr = '<div class="prereqs">Prerequisites: ' + escapeHtml(c.prerequisites.join(', ')) + '</div>';
          }
          card.innerHTML =
            '<div class="badges">' +
            '<span class="badge code">' + escapeHtml(c.course_code) + '</span>' +
            '<span class="badge meta">' + formatCredits(c.credits) + ' · ' + escapeHtml(c.department) + '</span>' +
            '</div>' +
            '<div class="title">' + escapeHtml(c.title) + '</div>' +
            (c.professor ? '<div class="instructor">' + escapeHtml(c.professor) + '</div>' : '') +
            (c.description ? '<div class="desc">' + escapeHtml(c.description) + '</div>' : '') +
            pr;
          list.appendChild(card);
        });
        bubble.appendChild(list);
      }

      wrap.appendChild(bubble);
      row.appendChild(avatar);
      row.appendChild(wrap);
      messagesEl.appendChild(row);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function addUserMessage(text) {
      hideEmptyState();
      const row = document.createElement('div');
      row.className = 'row user';
      const avatar = document.createElement('div');
      avatar.className = 'avatar';
      avatar.textContent = 'You';
      const wrap = document.createElement('div');
      wrap.className = 'bubble-wrap';
      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.textContent = text;
      wrap.appendChild(bubble);
      row.appendChild(avatar);
      row.appendChild(wrap);
      messagesEl.appendChild(row);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function showLoading() {
      hideEmptyState();
      const row = document.createElement('div');
      row.className = 'row bot loading-row';
      row.id = 'loading-row';
      const avatar = document.createElement('div');
      avatar.className = 'avatar';
      avatar.textContent = 'AI';
      const wrap = document.createElement('div');
      wrap.className = 'bubble-wrap';
      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.innerHTML =
        '<div class="dots" aria-hidden="true"><span></span><span></span><span></span></div>' +
        '<span>' + (useLlmEl.checked ? 'Retrieving & generating…' : 'Searching catalog…') + '</span>';
      wrap.appendChild(bubble);
      row.appendChild(avatar);
      row.appendChild(wrap);
      messagesEl.appendChild(row);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function removeLoading() {
      const el = document.getElementById('loading-row');
      if (el) el.remove();
    }

    async function send() {
      const text = inputEl.value.trim();
      if (!text) return;
      inputEl.value = '';
      resizeTa();
      addUserMessage(text);
      sendBtn.disabled = true;
      showLoading();

      try {
        const res = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            message: text,
            use_llm: useLlmEl.checked,
            include_rag_debug: ragDebugEl.checked,
          }),
        });
        const data = await res.json();
        removeLoading();
        if (!res.ok) {
          addBotMessage(formatApiDetail(data.detail), { isError: true });
          return;
        }
        addBotMessage(data.reply, {
          courses: data.courses || [],
          rag_used: data.rag_used,
          model: data.model,
          llm_error: data.llm_error,
          rag_debug: data.rag_debug,
          isError: false,
        });
      } catch (e) {
        removeLoading();
        addBotMessage('Cannot reach the server. Run: uvicorn app.main:app --reload', { isError: true });
      } finally {
        sendBtn.disabled = false;
        inputEl.focus();
      }
    }

    sendBtn.addEventListener('click', send);
    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        send();
      }
    });
    inputEl.focus();
  </script>
</body>
</html>
